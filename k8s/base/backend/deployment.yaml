# Deployment du backend Spring Boot.
# Variables non-sensibles : injectées depuis le ConfigMap backend-config (envFrom).
# Variables sensibles    : injectées depuis le Secret "gestiondeprojets-secrets", généré
#                          depuis le .env racine par le secretGenerator de l'overlay.
# Mapping de clés : le .env utilise MYSQL_USER / MYSQL_PASSWORD / JWT_SECRET ;
# Spring Boot attend DB_USERNAME / DB_PASSWORD / APP_JWT_SECRET.
# Un initContainer attend que MySQL soit joignable avant de démarrer Spring Boot.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: gestiondeprojets
  labels:
    app: gestiondeprojets
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gestiondeprojets
      component: backend
  template:
    metadata:
      labels:
        app: gestiondeprojets
        component: backend
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "En attente de MySQL sur mysql:3306..."
              until nc -z mysql 3306; do
                echo "MySQL pas encore prêt. Nouvelle tentative dans 3s..."
                sleep 3
              done
              echo "MySQL est prêt. Démarrage du backend."

      containers:
        - name: backend
          image: gestiondeprojets-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8085
          # Variables non-sensibles depuis le ConfigMap
          envFrom:
            - configMapRef:
                name: backend-config
          # Variables sensibles depuis le Secret généré à partir du .env
          env:
            # Le .env a MYSQL_USER=... → Spring Boot attend DB_USERNAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: gestiondeprojets-secrets
                  key: MYSQL_USER
            # Le .env a MYSQL_PASSWORD=... → Spring Boot attend DB_PASSWORD
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gestiondeprojets-secrets
                  key: MYSQL_PASSWORD
            # Le .env a JWT_SECRET=... → Spring Boot attend APP_JWT_SECRET
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gestiondeprojets-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
