# ConfigMap backend — variables de configuration non-sensibles.
# Ces valeurs peuvent être versionnées sans risque (pas de secrets ici).
# Le profil "k8s" active application-k8s.properties dans Spring Boot,
# qui lit DB_HOST, DB_PORT, DB_NAME pour construire l'URL JDBC.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: gestiondeprojets
  labels:
    app: gestiondeprojets
    component: backend
data:
  # Profil Spring Boot : active application-k8s.properties
  SPRING_PROFILES_ACTIVE: k8s

  # Adresse du service MySQL dans le cluster (correspond au nom du Service mysql)
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_NAME: gestion_projet

  # Port d'écoute du backend (doit correspondre à server.port dans application-k8s.properties)
  SERVER_PORT: "8085"

  # Durée de validité des JWT en millisecondes.
  APP_JWT_EXPIRATION_MS: "86400000"

  # Origines autorisées pour CORS lorsque l'API est appelée directement depuis le navigateur.
  CORS_ALLOWED_ORIGINS: "http://localhost:30080"
