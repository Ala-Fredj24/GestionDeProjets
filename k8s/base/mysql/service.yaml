# Service MySQL — expose le port 3306 à l'intérieur du cluster.
# Nom : mysql, ce qui correspond exactement à la valeur par défaut de DB_HOST
# dans application-k8s.properties (${DB_HOST:mysql}).
# Type ClusterIP : accessible uniquement depuis l'intérieur du cluster (backend uniquement).
# MySQL n'a pas besoin d'être accessible depuis l'extérieur en local.
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: gestiondeprojets
  labels:
    app: gestiondeprojets
    component: mysql
spec:
  selector:
    app: gestiondeprojets
    component: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  type: ClusterIP
