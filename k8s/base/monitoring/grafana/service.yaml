# Service Grafana — ClusterIP.
# Pour accéder depuis l'extérieur : kubectl port-forward svc/gestiondeprojets-grafana 3000:3000 -n gestiondeprojets
apiVersion: v1
kind: Service
metadata:
  name: gestiondeprojets-grafana
  namespace: gestiondeprojets
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: gestiondeprojets-monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
