# ConfigMap contenant le provider Grafana qui importe automatiquement les dashboards.
# Grafana le charge au demarrage depuis /etc/grafana/provisioning/dashboards/.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: gestiondeprojets
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: gestiondeprojets-monitoring
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: GestionDeProjets
        orgId: 1
        folder: GestionDeProjets
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioned-dashboards/gestiondeprojets
