# ConfigMap contenant la configuration Prometheus et les règles d'alerte.
# Prometheus lit ce fichier au démarrage et sur rechargement (POST /-/reload).
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gestiondeprojets
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: gestiondeprojets-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        env: k8s
        app: gestiondeprojets

    rule_files:
      - /etc/prometheus/rules/gestiondeprojets_alerts.yml

    scrape_configs:
      - job_name: gestiondeprojets-backend
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - backend.gestiondeprojets.svc.cluster.local:8085

  gestiondeprojets_alerts.yml: |
    groups:
      - name: gestiondeprojets
        rules:
          - alert: BackendDown
            expr: up{job="gestiondeprojets-backend"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Backend GestionDeProjets injoignable"
              description: "Prometheus ne peut pas scraper le backend. Instance : {{ $labels.instance }}"

          - alert: HighErrorRate
            expr: |
              sum(rate(http_server_requests_seconds_count{job="gestiondeprojets-backend", status=~"5.."}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{job="gestiondeprojets-backend"}[5m]))
              > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Taux d'erreurs 5xx élevé"
              description: "{{ $value | humanizePercentage }} d'erreurs HTTP 5xx sur 5 minutes."
