# Spring Boot configuration for Docker environment

server.port=8085

# MySQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/gestion_projet?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:appuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:apppass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# Logging
logging.level.root=INFO
logging.level.com.projetjee.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# Observability
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.endpoint.prometheus.access=unrestricted
management.endpoint.health.access=unrestricted
management.info.env.enabled=true
info.app.name=GestionDeProjets Backend
info.app.phase=12-observability

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:30080}

# JWT
app.jwt.secret=${APP_JWT_SECRET:Q2VjaUVzdFVuU2VjcmV0SldUU3VwZXJMb25nUG91ckphdmExN1NwcmluZ0Jvb3Q0MjAyNg==}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Jackson
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
