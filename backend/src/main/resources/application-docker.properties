# Spring Boot configuration for Docker environment

# Server
server.port=8085
server.servlet.context-path=/api

# MySQL Database
spring.datasource.url=jdbc:mysql://mysql:3306/gestion_projet?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=appuser
spring.datasource.password=apppass
spring.jpa.hibernate.ddl-auto=update

# Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# Logging
logging.level.root=INFO
logging.level.com.projetjee.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO

# CORS
cors.allowed-origins=http://frontend:4200,http://localhost:4200
cors.allowed-methods=*
cors.allowed-headers=*
cors.allow-credentials=true

# JWT
jwt.secret=your-super-secret-key-change-in-production-environment-variables
jwt.expiration=86400000

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Jackson
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
