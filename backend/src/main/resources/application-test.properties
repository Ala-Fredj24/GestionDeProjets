# Test Profile Configuration - H2 In-Memory Database

# H2 Database (In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional for debugging)
spring.h2.console.enabled=false

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Disable SQL logging in tests
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# JWT Configuration (same as production for test consistency)
app.jwt.secret=Q2VjaUVzdFVuU2VjcmV0SldUU3VwZXJMb25nUG91ckphdmExN1NwcmluZ0Jvb3Q0MjAyNg==
app.jwt.expiration-ms=86400000

# Server Port for tests
server.port=8085
