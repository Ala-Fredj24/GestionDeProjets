name: Security

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  schedule:
    # Weekly on Monday at 03:00 UTC
    - cron: "0 3 * * 1"

# Phase 22.1:
# Sur main, ce workflow devient une validation bloquante au meme titre que CI.
# Le CD attend sa conclusion "success" avant toute livraison.
#
# Phase 22.2:
# Sur les PR vers main, ce workflow reste un required check avant merge ou
# auto-merge, aux cotes de CI et du workflow PR Validation.
#
# Phase 22.4:
# Les PR GitOps creees par github-actions[bot] ne doivent pas relancer les scans
# lourds CodeQL / OWASP / Trivy. Sur ce type de PR, ce workflow est ignore.

jobs:
  # ── CodeQL — SAST ────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL — ${{ matrix.language }}
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'github-actions[bot]' ||
      !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-')
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.35.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Setup Java 17 (Java analysis only)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Compile backend (Java analysis only)
        if: matrix.language == 'java-kotlin'
        working-directory: backend
        run: mvn --batch-mode compile -DskipTests
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET}}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.35.2
        with:
          category: "/language:${{ matrix.language }}"

  # ── OWASP Dependency-Check — Maven ───────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency-Check — backend
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'github-actions[bot]' ||
      !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-')

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Java 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Restore Dependency-Check data cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        id: dependency-check
        working-directory: backend
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          log_file="$RUNNER_TEMP/dependency-check.log"
          report_file="target/dependency-check-report.html"
          nvd_delay=10000

          args=(
            --batch-mode
            org.owasp:dependency-check-maven:12.2.1:check
            -DfailBuildOnCVSS=9
            -Dformat=HTML
            -DdataDirectory="$HOME/.m2/repository/org/owasp/dependency-check-data"
            -DnvdMaxRetryCount=20
          )

          if [ -n "${NVD_API_KEY:-}" ]; then
            nvd_delay=4000
            args+=("-DnvdApiKeyEnvironmentVariable=NVD_API_KEY")
          fi

          args+=("-DnvdApiDelay=${nvd_delay}")

          set +e
          for attempt in 1 2 3; do
            echo "Dependency-Check attempt ${attempt}/3"
            mvn "${args[@]}" 2>&1 | tee "$log_file"
            status=${PIPESTATUS[0]}

            if [ "$status" -eq 0 ]; then
              echo "cacheable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep 60
            fi
          done
          set -e

          if grep -Eq "NVD Update Failed|Error updating the NVD Data|NoDataException: No documents exist" "$log_file" \
            && [ ! -f "$report_file" ]; then
            echo "::warning::OWASP Dependency-Check could not refresh initial NVD data after retries. Skipping this scan so the workflow is not blocked by an external NVD outage. Add/verify the NVD_API_KEY secret to reduce this flakiness."
            echo "cacheable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -f "$report_file" ]; then
            echo "cacheable=true" >> "$GITHUB_OUTPUT"
          fi

          exit "$status"

      - name: Save Dependency-Check data cache
        if: always() && steps.dependency-check.outputs.cacheable == 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html
          retention-days: 30

  # ── Trivy — Docker image scans ───────────────────────────────────────────────
  trivy-backend:
    name: Trivy — backend Docker image
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'github-actions[bot]' ||
      !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-')
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Build backend Docker image
        run: docker build -t gestiondeprojets-backend:scan ./backend

      - name: Scan backend image
        id: trivy-backend-scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: gestiondeprojets-backend:scan
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Upload backend scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4.35.2
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  trivy-frontend:
    name: Trivy — frontend Docker image
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'github-actions[bot]' ||
      !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-')
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Build frontend Docker image
        run: docker build -t gestiondeprojets-frontend:scan ./frontend

      - name: Scan frontend image
        id: trivy-frontend-scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: gestiondeprojets-frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Upload frontend scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4.35.2
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
