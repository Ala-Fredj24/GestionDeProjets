name: CI - Build & Test

on:
  push:
    branches:
      - dev
      - 'feat/**'
      - 'chore/**'
  pull_request:
    branches:
      - dev
      - 'feat/**'
      - 'chore/**'

jobs:
  backend-build-test:
    name: Backend - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build backend
        working-directory: ./backend
        run: mvn clean compile -DskipTests

      - name: Run backend tests
        working-directory: ./backend
        run: mvn test

      - name: Generate test report
        if: always()
        working-directory: ./backend
        run: mvn surefire-report:report

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 30

      - name: Generate JaCoCo report
        working-directory: ./backend
        run: mvn jacoco:report

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 30

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = './backend/target/site/jacoco/index.html';
            if (fs.existsSync(path)) {
              const content = fs.readFileSync(path, 'utf8');
              const instructionsMatch = content.match(/Instruction Coverage\s+<\/dt>\s+<dd>([^<]+)</);
              const branchMatch = content.match(/Branch Coverage\s+<\/dt>\s+<dd>([^<]+)</);
              
              if (instructionsMatch && branchMatch) {
                const instructions = instructionsMatch[1].trim();
                const branches = branchMatch[1].trim();
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `## 📊 Backend Coverage Report\n\n| Metric | Value |\n|--------|-------|\n| Instructions | ${instructions} |\n| Branches | ${branches} |\n\n✅ See artifacts for full report.`
                });
              }
            }

  frontend-build-test:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint 2>/dev/null || echo "Linting skipped or not configured"

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test 2>/dev/null || echo "Tests skipped or not configured"

      - name: Upload frontend build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  security-check:
    name: Security & Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          path: '.'
          format: 'JSON'
          args: >
            --exclude '.git,.github,node_modules,target,.*'
        continue-on-error: true

      - name: Upload dependency check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 30

  build-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-test]
    if: always()

    steps:
      - name: Check CI Status
        run: |
          if [[ "${{ needs.backend-build-test.result }}" == "failure" || "${{ needs.frontend-build-test.result }}" == "failure" ]]; then
            echo "❌ CI pipeline failed!"
            exit 1
          fi
          echo "✅ CI pipeline passed!"
          exit 0
