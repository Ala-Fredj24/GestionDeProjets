name: CI

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev


jobs:
  backend:
    name: Backend — test & build
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'github-actions[bot]' ||
      !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-')
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run tests, build and enforce coverage
        run: ./mvnw --batch-mode verify

  frontend:
    name: Frontend — lint, test & build
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'github-actions[bot]' ||
      !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-')
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check format
        run: npm run format:check

      - name: Run tests and enforce coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Build
        run: npm run build

  sonarcloud:
    name: SonarCloud — quality gate
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    if: >-
      github.ref == 'refs/heads/main' ||
      (
        github.event_name == 'pull_request' &&
        github.base_ref == 'main' &&
        (
          github.event.pull_request.user.login != 'github-actions[bot]' ||
          !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-')
        )
      )

    steps:
      - name: Checkout (full history for blame data)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate frontend coverage report
        working-directory: frontend
        run: npm run test:coverage
        env:
          CI: true

      - name: Build backend and generate coverage report
        working-directory: backend
        run: ./mvnw --batch-mode verify dependency:copy-dependencies -DincludeScope=compile -DoutputDirectory=target/dependency
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET || 'Q2VjaUVzdFVuU2VjcmV0SldUU3VwZXJMb25nUG91ckphdmExN1NwcmluZ0Jvb3Q0MjAyNg==' }}

      - name: Verify Sonar coverage inputs exist
        run: |
          test -f backend/target/site/jacoco/jacoco.xml
          test -f frontend/coverage/frontend/lcov.info

      - name: Skip SonarCloud when token is not configured
        if: env.SONAR_TOKEN == ''
        run: echo "SONAR_TOKEN is not configured; skipping SonarCloud scan."

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
